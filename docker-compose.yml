version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Admin123!}
      MYSQL_DATABASE: student_management
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-api:
    build:
      context: ./ml-predictor
      dockerfile: Dockerfile
    container_name: sms-ml-api
    ports:
      - "5000:5000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-web
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ml-api:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: student_management
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Admin123!}
      ML_API_URL: http://ml-api:5000
    restart: unless-stopped

volumes:
  mysql_data: